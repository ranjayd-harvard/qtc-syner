name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  web-check:
    name: Web — Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  connector-check:
    name: Connector API — Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/connector-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/connector-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  docker-smoke:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    needs: [web-check, connector-check]
    steps:
      - uses: actions/checkout@v4

      - name: Create env file
        run: |
          cp .env.example .env
          sed -i "s|replace_with_64_char_hex_string_00000000000000000000000000000000|$(openssl rand -hex 32)|g" .env
          sed -i "s|replace_with_64_char_hex_string_11111111111111111111111111111111|$(openssl rand -hex 32)|g" .env
          sed -i "s|replace_with_nextauth_secret_base64_string|$(openssl rand -base64 32)|g" .env
          sed -i "s|changeme_strong_password_here|ci_password_123|g" .env

      - name: Build images
        run: docker compose build --no-cache

      - name: Verify images built
        run: docker compose images
