services:
  mongodb:
    ports:
      - "27021:27017"

  mongo-express:
    image: mongo-express:1.0.2
    container_name: qtc-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - qtc-internal

  connector-api:
    build:
      context: ./apps/connector-api
      dockerfile: Dockerfile.dev
    volumes:
      - ./apps/connector-api/src:/app/src:cached
    environment:
      NODE_ENV: development
      PORT: 4000
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    volumes:
      - ./apps/web/src:/app/src:cached
      - ./apps/web/public:/app/public:cached
      - ./apps/web/next.config.mjs:/app/next.config.mjs:ro
    environment:
      NODE_ENV: development
      NEXTAUTH_URL: http://localhost:3061
    ports:
      - "3061:3061"
