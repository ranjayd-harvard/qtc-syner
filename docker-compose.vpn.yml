# Use when connector-api must run on the host to access VPN-routed databases (Redshift, NetSuite).
# Start Docker services:  npm run dev:vpn
# Start connector-api:    npm run connector:dev
services:
  mongodb:
    image: mongo:7.0
    container_name: qtc-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: qtc_syncer
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongo-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "27021:27017"
    networks:
      - qtc-internal
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongo-express:
    image: mongo-express:1.0.2
    container_name: qtc-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - qtc-internal

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    container_name: qtc-web
    volumes:
      - ./apps/web/src:/app/src:cached
      - ./apps/web/public:/app/public:cached
      - ./apps/web/next.config.mjs:/app/next.config.mjs:ro
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/qtc_syncer?authSource=admin
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CONNECTOR_API_URL: http://host.docker.internal:4000
      CONNECTOR_INTERNAL_KEY: ${CONNECTOR_INTERNAL_KEY}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: http://localhost:3061
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - qtc-internal
    ports:
      - "3061:3061"

networks:
  qtc-internal:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
